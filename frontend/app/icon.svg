<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="50%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#14532d" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#leafGrad)" />
  
  <!-- Leaf icon -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)">
    <!-- Main outer leaf contour -->
    <path d="M256,80 C120,80 64,180 64,300 C64,430 140,460 256,460 C372,460 448,430 448,300 C448,180 392,80 256,80 Z" stroke-width="32" />
    <!-- Center stem -->
    <line x1="256" y1="460" x2="256" y2="120" stroke-width="32" />
    <!-- Left vein 1 -->
    <path d="M256,360 L140,260" stroke-width="28" />
    <!-- Right vein 1 -->
    <path d="M256,300 L370,200" stroke-width="28" />
    <!-- Left vein 2 -->
    <path d="M256,240 L160,160" stroke-width="24" />
    <!-- Right vein 2 -->
    <path d="M256,180 L340,110" stroke-width="24" />
  </g>
</svg>
