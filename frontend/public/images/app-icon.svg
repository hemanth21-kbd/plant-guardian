<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Background transparent -->
  <rect width="400" height="400" fill="transparent"/>

  <!-- Soil Mound -->
  <path d="M 50 320 Q 200 250 350 320 Q 300 400 200 400 Q 100 400 50 320 Z" fill="#9C7755"/>

  <!-- Roots -->
  <path d="M 200 320 Q 180 350 160 380 M 200 320 Q 210 340 230 370 M 200 340 Q 170 350 150 360 M 200 350 Q 230 360 250 380 M 215 365 Q 220 385 240 395 M 180 360 Q 170 380 185 390" stroke="#C4A484" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Main Stem -->
  <path d="M 200 320 Q 190 200 220 100" stroke="#68A042" stroke-width="12" fill="none" stroke-linecap="round"/>
  
  <!-- Left Branch -->
  <path d="M 197 250 Q 140 220 100 240" stroke="#68A042" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Right Branch -->
  <path d="M 203 180 Q 260 140 300 160" stroke="#68A042" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Small top left branch -->
  <path d="M 213 140 Q 170 110 160 90" stroke="#68A042" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Leaves Main -->
  <path d="M 220 100 Q 200 50 240 40 Q 280 50 220 100 Z" fill="#548C31"/>
  <path d="M 220 100 Q 250 70 290 80 Q 270 120 220 100 Z" fill="#548C31"/>

  <!-- Leaves Left Branch -->
  <path d="M 100 240 Q 70 190 50 220 Q 60 260 100 240 Z" fill="#548C31"/>
  <path d="M 120 230 Q 80 200 90 180 Q 130 190 120 230 Z" fill="#548C31"/>

  <!-- Leaves Right Branch -->
  <path d="M 300 160 Q 330 110 350 140 Q 340 180 300 160 Z" fill="#548C31"/>
  <path d="M 270 150 Q 310 120 300 100 Q 260 110 270 150 Z" fill="#548C31"/>

  <!-- Small top left leaves -->
  <path d="M 160 90 Q 130 60 120 80 Q 140 110 160 90 Z" fill="#548C31"/>
  <path d="M 170 100 Q 140 80 150 60 Q 180 70 170 100 Z" fill="#548C31"/>

  <!-- Tomatoes (Red) -->
  <circle cx="150" cy="250" r="16" fill="#E64A33"/>
  <!-- Tomato highlight -->
  <circle cx="145" cy="245" r="4" fill="#FF8A75"/>

  <circle cx="260" cy="180" r="14" fill="#E64A33"/>
  <circle cx="255" cy="175" r="3" fill="#FF8A75"/>

  <circle cx="280" cy="190" r="12" fill="#E64A33"/>
  <circle cx="276" cy="186" r="2" fill="#FF8A75"/>

  <!-- Flowers (Yellow) -->
  <circle cx="180" cy="130" r="5" fill="#F4D03F"/>
  <circle cx="172" cy="125" r="4" fill="#F4D03F"/>
  <circle cx="188" cy="125" r="4" fill="#F4D03F"/>
  <circle cx="180" cy="120" r="4" fill="#F4D03F"/>

  <circle cx="200" cy="145" r="6" fill="#F4D03F"/>
  <circle cx="192" cy="140" r="5" fill="#F4D03F"/>
  <circle cx="208" cy="140" r="5" fill="#F4D03F"/>
  <circle cx="200" cy="135" r="5" fill="#F4D03F"/>
</svg>
