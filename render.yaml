services:
  - type: web
    name: plant-guardian-backend
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 10000
      - key: GOOGLE_API_KEY
        sync: false
      - key: PLANT_ID_API_KEY
        sync: false
      - key: THUNDERFOREST_API_KEY
        sync: false
      - key: MAP_PROVIDER
        value: thunderforest
